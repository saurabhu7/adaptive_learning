  <path class="arrow" d="M610 785 H600"/>
  <path class="arrow" d="M700 805 V840"/>
  <path class="arrow" d="M700 805 H600 V800"/>
  <text class="small" x="70" y="875">Output: personalized learning strategy, emotion analytics, AI notes PDF, auto exam, teacher/admin BI dashboard</text>
