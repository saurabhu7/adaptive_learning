<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background:
                radial-gradient(circle at top left, rgba(6, 182, 212, 0.26), transparent 30%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.22), transparent 32%),
                linear-gradient(135deg, #172554 0%, #3730a3 55%, #0f766e 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 34px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.34);
        }

        .auth-card h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-light);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'success' %}alert-success{% elif category == 'warning' %}alert-warning{% else %}alert-error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h1>Create account</h1>
        <p>Register a student, teacher, or admin user in the local database.</p>

        <form method="post" action="{{ url_for('createaccount') }}">
            <div class="grid-2">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input id="username" name="username" type="text" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile</label>
                    <input id="mobile" name="mobile" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-full">Create Account</button>
        </form>

        <p style="margin-top: 18px;">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</body>
</html>
